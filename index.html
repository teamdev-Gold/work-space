<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Recursion</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <!-- css -->
    <link rel="stylesheet" href="style.css" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--da担当header----ここから-->
    <header class="nothing-you-could-do">
      <nav class="nav-bar">
        <a class="navbar-brand" href="#">Cafe Recursion</a>
        <ul class="nav-list">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Drink</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Sweets</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Food</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Information</a></li>
        </ul>
      </nav>
    </header>
    <!--da担当header----ここまで-->
    <!-- wataru担当 カルーセル bootstrap使用-->
    <section>
      <div class="slider">
        <div class="slider-item">
          <img src="https://acha0203.github.io/Cafe-Recursion/images/coffee-2151200_1280.jpg" alt="slider-image1" class="slider__img"/>
        </div>
        <div class="slider-item">
          <img src="https://acha0203.github.io/Cafe-Recursion/images/pancakes-5989136_1280.jpg" alt="slider-image2" class="slider__img"/>
        </div>
        <div class="slider-item">
          <img src="https://acha0203.github.io/Cafe-Recursion/images/cake-1284548_1280.jpg" alt="slider-image3" class="slider__img"/>
        </div>
        <div class="slider-item">
          <img src="https://acha0203.github.io/Cafe-Recursion/images/apple-pie-5479993_1280.jpg" alt="slider-image4" class="slider__img"/>
        </div>
      </div>
    </section>
    <section class="container-fluid">
      <div class="d-flex flex-wrap justify-content-center align-items-center">
        <h2 class="nothing-you-could-do welcome">Welcome to&nbsp;</h2>
        <h1 class="nothing-you-could-do cafe-recursion">Cafe Recursion</h1>
      </div>
    <!--Kuma担当メインコンテンツ----ここから-->
    <!--自作する必要があるCSSには!をつける-->
      <div class="row">
        <!--1ブロック目-->
        <div class="col-12 col-lg-6">
          <div class="card card-style">
            <div class="card-body">
              <h5 class="card-title nothing-you-could-do middle-font">
                What's New?
              </h5>
              <div
                class="card-content-wrapper justify-content-around align-items-center"
              >
                <p class="card-content">
                  春の新メニュー「フルーツパイ」をご用意しました。新鮮なフルーツと生クリームのハーモニーをお楽しみください。
                </p>
                <img
                  class="card-photo"
                  src="https://acha0203.github.io/Cafe-Recursion/images/cake-4910417_1280.jpg"
                  alt="fruit_pie"
                />
              </div>
            </div>
          </div>
        </div>
        <!--2ブロック目-->
        <div class="col-12 col-lg-6">
          <div class="card card-style">
            <div class="card-body">
              <h5 class="card-title nothing-you-could-do middle-font">
                Recommendation
              </h5>
              <div
                class="card-content-wrapper justify-content-around align-items-center"
              >
                <p class="card-content">
                  今月のお薦めは「ラムダブレンド」。やや苦みのある上品な香りのコーヒーです。
                </p>
                <img
                  class="card-photo"
                  src="https://acha0203.github.io/Cafe-Recursion/images/coffee-6632524_1280.jpg"
                  alt="fruit_pie"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!--Kuma担当メインコンテンツ----ここまで-->

    <!--da担当footer----ここから-->
    <footer>
      <div class="copy-right">©︎ 2025 Cafe Recursion. All right Reserved.</div>
    </footer>
    <!--da担当footer----ここまで-->
  </body>
</html>
